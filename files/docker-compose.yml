version: '3.9'

# ════════════════════════════════════════════════════════════════════
#  docker-compose.yml — MERN File Explorer
#  Usage: docker compose up --build
# ════════════════════════════════════════════════════════════════════

services:

  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: file-explorer-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: fileexplorer
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API ───────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile
    container_name: file-explorer-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI:             mongodb://mongo:27017/fileexplorer
      PORT:                  5000
      CLIENT_URL:            http://localhost:3000
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION:            ${AWS_REGION:-ap-southeast-1}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET}

  # ── Static Frontend (nginx) ───────────────────────────────────────
  client:
    image: nginx:alpine
    container_name: file-explorer-client
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro

volumes:
  mongo-data:
